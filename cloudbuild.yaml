steps:
  # Install dependencies
  - name: 'node'
    entrypoint: 'npm'
    args: ['install']
    id: 'deps-install'
  - name: 'node'
    entrypoint: 'npm'
    args: ['run', 'build-api']
    id: 'build-api'
  - name: 'node'
    entrypoint: 'npm'
    args: ['run', 'test-api']
    id: 'test-api'
  # Docker Build
  - name: 'docker'
    args: ['build', '-t', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA', '.']
    id: 'docker-build'
  # Docker Push
  - name: 'docker'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA']
    id: 'docker-push'
  # Update gcloud
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - components
      - update
    entrypoint: gcloud
    id: 'gcloud-update'
  # Check version
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - --version
    entrypoint: gcloud
    id: 'gcloud-check-version'
  # Deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - $_DEPLOY_REGION
      - '--platform'
      - $_PLATFORM
    entrypoint: gcloud
    id: 'deploy'
timeout: 600s
images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY