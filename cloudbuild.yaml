# [START cloudbuild_npm_node]
steps:
  # Install dependencies
  - name: install
    entrypoint: bun
    args: ["install"]
  # Run tests
  - name: tests
    entrypoint: bun
    args: ["test"]
  # Run custom commands
  - name: build
    entrypoint: bun
    args: ["run", "build"]
  - name: gcp
    dir: dist/apps/${_SERVICE_NAME}
    entrypoint: gcloud
    args:
      - app
      - deploy
      - app-engine-yaml
      - --version=$SHORT_SHA
      - --promote
      - --stop-previous-version
      - --quiet
# [END cloudbuild_npm_node]
options:
  logging: CLOUD_LOGGING_ONLY